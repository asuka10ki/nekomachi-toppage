<style>
  html,
  body {
    background-color: #D6E3E0;
  }

  .guest_top_area {
    background-color: #D6E3E0;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .title_panel {
    width: 303px;
    margin: 0 auto;
    position: relative;
  }

  .title_panel img {
    width: 100%;
  }

  .boundary_img {
    width: 90%;
    margin: 0 auto;
    display: block;
    max-width: 600px;
  }

  .title_panel-text {
    font-size: 24px;
    letter-spacing: 6px;
    color: #50221f;
    width: 100%;
    text-align: center;
    margin: 40px auto 20px;
  }

  .first_view_area {}

  .top_image_area {
    position: relative;
  }

  .top_image_area-img {
    background-position: center;
    background-size: cover;
    height: 60vh;
  }

  .top_image_area-logo {
    width: 80%;
    max-width: 300px;
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .first_view_area_bottom {
    position: relative;
    background-color: #D6E3E0;
    height: 220px;
  }

  .first_view_area_bottom_txt {
    font-family: "游明朝", "Yu Mincho", "游明朝体", "YuMincho", "ヒラギノ明朝 Pro W3", "Hiragino Mincho Pro", "HiraMinProN-W3", "HGS明朝E", "ＭＳ Ｐ明朝", "MS PMincho", serif;
    font-weight: 600;
    font-size: 26px;
    line-height: 1.62;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    height: 100%;
    padding-top: 0;
  }

  .guest_top_news {
    background-color: #D6E3E0;
    padding: 20px 0 40px;
  }

  .news_panel {
    width: 85%;
    margin: 0 auto;
    font-size: 14px;
    font-weight: bold;
    padding: 15px 0;
    max-width: 562px;
  }

  .news_panel-date {
    color: #50221f;
  }

  .news_panel a {
    color: #a5170e;
  }

  .other_page_link {
    display: flex;
    max-width: 600px;
    margin: 0 auto;
    justify-content: space-around;
    flex-wrap: wrap;
  }

  .other_page_link-image {
    width: 75%;
    max-width: 200px;
    display: flex;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    height: 70px;
    margin: 0 auto 30px;
    text-decoration: none;
    justify-content: center;
    align-items: center;
    font-size: 16px;
    color: #a71d45;
  }

  /* SP措置 */
  @media screen and (max-width: 680px) {}

  /* ---------slick.min.css----------- */

  .slick-slider {
    position: relative;
    display: block;
    box-sizing: border-box;
    user-select: none;
    touch-action: pan-y;
    height: 100%;
  }

  .slick-list {
    position: relative;
    display: block;
    overflow: hidden;
    margin: 0;
    padding: 0;
    height: 100%;
  }

  .slick-list:focus {
    outline: 0;
  }

  .slick-list.dragging {
    cursor: pointer;
    cursor: hand;
  }

  .slick-slider .slick-list,
  .slick-slider .slick-track {
    transform: translate3d(0, 0, 0);
  }

  .slick-track {
    position: relative;
    top: 0;
    left: 0;
    display: block;
    margin-left: auto;
    margin-right: auto;
    height: 100%;
  }

  .slick-track:after,
  .slick-track:before {
    display: table;
    content: '';
  }

  .slick-track:after {
    clear: both;
  }

  .slick-loading .slick-track {
    visibility: hidden;
  }

  .slick-slide {
    display: none;
    float: left;
    height: 100%;
    min-height: 1px;
  }

  [dir=rtl] .slick-slide {
    float: right;
  }

  .slick-slide img {
    display: block;
    width: 100%;
  }

  .slick-slide.slick-loading img {
    display: none;
  }

  .slick-slide.dragging img {
    pointer-events: none;
  }

  .slick-initialized .slick-slide {
    display: block;
  }

  .slick-loading .slick-slide {
    visibility: hidden;
  }

  .slick-vertical .slick-slide {
    display: block;
    height: auto;
    border: 1px solid transparent;
  }

  .slick-arrow.slick-hidden {
    display: none;
  }

  .slider {
    height: 60vh;
  }

  .top_image_area {
    /* transition: 0.5s; */
    /* transform: scale(.75 ); */
    /* opacity: 0.3; */
  }

  .slick-center {
    /* transform: scale( 1 ); */
    /* opacity: 1; */
  }

  /* ------------------------------ */
</style>

        <div style="background-image: url('https://image.osiro.it/pass/media_libraries/1513/images/original/%E3%82%B5%E3%83%AD%E3%82%B9_%281%29.jpg?1596680686');" class="top_image_area-img"></div>
        <div style="background-image: url('https://image.osiro.it/pass/media_libraries/1514/images/original/300%E4%BA%BA%E8%AA%AD%E6%9B%B8%E4%BC%9A_%281%29.jpg?1596680695');" class="top_image_area-img"></div>
      </div>

      <img class="top_image_area-logo" src="https://image.osiro.it/pass/media_libraries/8400/images/original/line_oa_chat_260513_151904.jpg?1778732893" />
    </div>

    <div class="first_view_area_bottom">
      <div class="first_view_area_bottom_txt">扉を開けると<br />本の向こう側の世界が<br />広がっていた</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1/slick/slick.min.js"></script>
<script>
  $('.slider').slick({
    autoplay: true,
    centerMode: true,
    centerPadding: '20%',
    autoplaySpeed: 1000,
    arrows: false,
    pauseOnFocus: false,

    responsive: [{

        centerPadding: 0,
        fade: true
      }
    }]
  });
</script>
